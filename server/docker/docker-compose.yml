version: "3.9"

services:

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ssl_certs:/etc/nginx/certs:ro
      - static_files:/srv/static:ro
    environment:
      - NGINX_HOST=${PUBLIC_HOST:-localhost}
      - NGINX_PORT=80
    depends_on:
      - app
      - admin
    networks:
      - public
      - internal

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
      args:
        VITE_API_BASE_URL: https://${PUBLIC_HOST:-localhost}/api/v1
    restart: unless-stopped
    networks:
      - internal

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STORAGE_PATH: /data/projects
      LANCEDB_PATH: /data/vector
    volumes:
      - project_data:/data/projects
      - vector_data:/data/vector
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-llmwiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-llmwiki}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llmwiki}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  project_data:
  vector_data:
  ssl_certs:
  static_files:

networks:
  public:
  internal:
    internal: true
